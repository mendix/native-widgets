appId: "${APP_ID}"
---
- runFlow:
    file: "../../../../../../maestro/Precondition.yaml"
- tapOn:
    text: "B"
- tapOn:
    text: "Bottom Sheet"
- tapOn:
    text: "Modal basic non native"
- tapOn:
    text: "Open"

# Wait until the sheet is actually open (button label changes)
- extendedWaitUntil:
    visible: "Close"
    timeout: 10000

# Small settle time so we don't capture mid-animation
- wait: 500

- takeScreenshot:
    path: "maestro/images/actual/${PLATFORM}/bottom_sheet_modal_basic_non_native"