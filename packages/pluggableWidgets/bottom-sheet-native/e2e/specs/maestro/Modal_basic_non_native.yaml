appId: "${APP_ID}"
---
- runFlow:
    file: "../../../../../../maestro/Precondition.yaml"
- tapOn:
    text: "B"
- tapOn:
    text: "Bottom Sheet"
- tapOn:
    text: "Modal basic non native"
# Wait for the page to fully load before tapping Open
- extendedWaitUntil:
    visible: "Open"
    timeout: 10000
- tapOn:
    text: "Open"

# Wait until the sheet is actually open (button label changes)
- extendedWaitUntil:
    visible: randText
    optional: true
    timeout: 25000

- takeScreenshot:
    path: "maestro/images/actual/${PLATFORM}/bottom_sheet_modal_basic_non_native"
- assertScreenshot:
    path: "maestro/images/expected/${PLATFORM}/bottom_sheet_modal_basic_non_native.png"
