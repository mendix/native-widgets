- runFlow:
    file: "../../../../../../maestro/Precondition.yaml"
- tapOn:
    text: "B"
- tapOn:
    text: "Bottom Sheet"
- tapOn:
    text: "Modal basic non native"
- tapOn:
    text: "Open"

# Wait until the sheet is actually open (button label changes)
- extendedWaitUntil:
    visible: "Close"
    timeout: 20000

# Add an additional wait for a sheet-specific element/text that indicates content finished rendering
- extendedWaitUntil:
    visible: "Close"
    timeout: 20000

# Longer settle time so we don't capture mid-animation on slower CI emulators
- wait: 1500

- takeScreenshot:
    path: "maestro/images/actual/${PLATFORM}/bottom_sheet_modal_basic_non_native"