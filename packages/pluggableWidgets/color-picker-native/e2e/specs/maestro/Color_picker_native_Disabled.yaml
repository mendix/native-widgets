appId: "${APP_ID}"
---
- runFlow:
    file: "../../../../../../maestro/Precondition.yaml"
- tapOn:
    text: "C"
- tapOn:
    text: "Color picker"
- tapOn:
    text: "Disabled"
- assertVisible:
