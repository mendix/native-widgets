appId: "${APP_ID}"
---
- retry:
    maxRetries: 2
    commands:
      - launchApp:
          clearState: true
          permissions:
            camera: allow
            notifications: allow
      - extendedWaitUntil:
          visible: "Widgets menu"
          # 60s per attempt × 2 retries. Was 240s × 3 (= up to 12 min PER flow), which is what
          # turned a broken/sluggish shard into a 60-min timeout. The up-front smoke check
          # (Smoke.yaml) already absorbs a fundamentally-broken build; this keeps a small
          # retry budget for genuine GitHub-runner sluggishness without the amplification.
          timeout: 60000
