      - name: "Download Android app"
        if: ${{ env.LOCAL_TEST_ARTIFACT_RUN_ID == '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-app
          path: android-app
      - name: "Setup needed tools"
        id: setup-needed-tools
