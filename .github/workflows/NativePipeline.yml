        with:
          name: app-package
      # Used only for local testing, will be empty on GitHub
      - name: "Download iOS app from specific run"
        if: ${{ env.LOCAL_TEST_ARTIFACT_RUN_ID != '' }}
        uses: ./.github/actions/use-arficats-from-specific-run
        with:
          artifact_name: ios-app
