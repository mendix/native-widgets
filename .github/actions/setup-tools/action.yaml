name: "Setup Tools"
description: "Common setup for widget and js test jobs"
inputs:
  mendix_version:
    description: "Mendix version"
    required: true
outputs:
  java-path:
    description: "Path to the installed Java"
    value: ${{ steps.setup-java.outputs.path }}
runs:
  using: "composite"
  steps:
    - name: "Setup Python and dependencies"
      uses: ./.github/actions/setup-python

    - name: "Setup Node and dependencies"
      uses: ./.github/actions/setup-node-with-cache
      
    - name: "Setup Java 21"
      id: setup-java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
      with:
        distribution: "temurin"
        java-version: "21"

    # NOTE: the Mendix-runtime tarball and m2ee-tools caches were removed here.
    # The portable app package bundles the runtime, so the test jobs no longer
    # download the runtime from the CDN or clone m2ee-tools.

    - name: "Install Maestro"
      uses: ./.github/actions/setup-maestro


