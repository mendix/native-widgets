name: "Setup Tools"
description: "Common setup for widget and js test jobs"
inputs:
  mendix_version:
    description: "Mendix version"
    required: true
outputs:
  java-path:
    description: "Path to the installed Java"
    value: ${{ steps.setup-java.outputs.path }}
runs:
  using: "composite"
  steps:
    - name: "Setup Node"
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: .nvmrc
        package-manager-cache: false

    - name: "Setup Python for m2ee-tools"
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: .github/scripts/m2ee-requirements.txt

    - name: "Install m2ee-tools Python dependencies"
      shell: bash
      run: pip install -r .github/scripts/m2ee-requirements.txt

    - name: "Setup Java 21"
      id: setup-java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
      with:
        distribution: "temurin"
        java-version: "21"

    - name: "Cache Mendix runtime"
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5
      with:
        path: tmp/runtime.tar.gz
        key: mendix-runtime-${{ inputs.mendix_version }}

    - name: "Cache m2ee-tools"
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5
      with:
        path: tmp/m2ee
        key: m2ee-tools-v1

    - name: "Install Maestro"
      uses: ./.github/actions/setup-maestro


